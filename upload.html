<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Wall</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="upload-container">

    <h1 id="titolo"></h1>

    <p class="subtitle">
        CARICA LA TUA FOTO QUI<br>
        E VEDILA SUL GRANDE SCHERMO
    </p>

    <label class="upload-btn">
        SCEGLI FOTO
        <input type="file" id="files" multiple hidden>
    </label>

    <br><br>

    <button onclick="up()" class="send-btn">CARICA</button>

    <!-- togli se non hai logo -->
    <!-- <img src="logo.png" class="logo"> -->

</div>

<script>

let CLOUD_NAME = "INSERISCI_IL_TUO_CLOUD_NAME";
let UPLOAD_PRESET = "INSERISCI_IL_TUO_PRESET";

let params = new URLSearchParams(location.search);
let ev = params.get("evento") || "evento";

document.getElementById("titolo").innerText = ev.toUpperCase();

async function up(){

let files=document.getElementById("files").files;

if(files.length === 0){
alert("Seleziona una foto");
return;
}

for(let f of files){

let form=new FormData();
form.append("file",f);
form.append("upload_preset",UPLOAD_PRESET);

let res=await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:form
});

let data=await res.json();

// salva nel database locale
let db = JSON.parse(localStorage.getItem("db") || "{}");

if(!db[ev]) db[ev] = [];

db[ev].push({
url: data.secure_url,
approvata: false
});

localStorage.setItem("db", JSON.stringify(db));

}

alert("Foto caricate 🔥");

}

</script>

</body>
</html>
