<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Wall</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="upload-container">

    <h1 id="titolo"></h1>

    <p class="subtitle">
        CARICA LA TUA FOTO QUI<br>
        E VEDILA SUL GRANDE SCHERMO
    </p>

    <label class="upload-btn">
        SCEGLI FOTO
        <input type="file" id="files" multiple hidden>
    </label>

    <br><br>

    <button onclick="up()" class="send-btn">CARICA</button>

</div>

<script>

let SERVER = "http://localhost:3000";

// prende evento da URL
let params = new URLSearchParams(location.search);
let ev = params.get("evento") || "LAUREA";

// titolo dinamico
document.getElementById("titolo").innerText = ev.toUpperCase();

async function up(){

let files = document.getElementById("files").files;

if(files.length === 0){
alert("Seleziona una foto");
return;
}

// 🔥 prendi cartelle dal server
let folders = await fetch(SERVER + "/folders").then(r=>r.json());

// trova cartella evento
let folder = folders.find(f => f.name === ev.toUpperCase());

if(!folder){
alert("Evento NON trovato su Drive");
return;
}

// 🔥 upload file
for(let f of files){

let form = new FormData();
form.append("file", f);
form.append("folderId", folder.id);

await fetch(SERVER + "/upload", {
method: "POST",
body: form
});

}

alert("Foto caricate su Drive 🔥");

}

</script>

</body>
</html>
