<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Wall</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="upload-container">

    <h1 id="titolo">CARICAMENTO FOTO</h1>

    <p class="subtitle">
        CARICA LA TUA FOTO QUI<br>
        E VEDILA SUL GRANDE SCHERMO
    </p>

    <label class="upload-btn">
        SCEGLI FOTO
        <input type="file" id="files" multiple hidden>
    </label>

    <br><br>

    <button onclick="up()" class="send-btn">CARICA</button>

</div>

<script>

const SERVER = "http://localhost:3001"; // ✅ PORTA GIUSTA

// 🔥 ID CARTELLA
const params = new URLSearchParams(location.search);
const folderId = params.get("evento");

// 🔥 DEBUG
console.log("ID EVENTO:", folderId);

// 🔥 MOSTRA NOME (facoltativo)
async function loadTitle(){

if(!folderId){
document.getElementById("titolo").innerText = "EVENTO NON VALIDO";
return;
}

try{

let res = await fetch(SERVER + "/folders");
let folders = await res.json();

let f = folders.find(x => x.id === folderId);

document.getElementById("titolo").innerText = f ? f.name : "EVENTO";

}catch(e){
console.log("Errore loadTitle:", e);
document.getElementById("titolo").innerText = "EVENTO";
}

}

loadTitle();

// 🔥 UPLOAD
async function up(){

let files = document.getElementById("files").files;

if(files.length === 0){
alert("Seleziona una foto");
return;
}

if(!folderId){
alert("Evento non valido");
return;
}

for(let file of files){

let formData = new FormData();
formData.append("file", file);
formData.append("folderId", folderId);

try{

let res = await fetch(SERVER + "/upload", {
method: "POST",
body: formData
});

let data = await res.json();

console.log("UPLOAD OK:", data);

}catch(e){
console.log("Errore upload:", e);
alert("Errore durante upload");
return;
}

}

alert("Foto caricate su Drive 🔥");

}

</script>

</body>
</html>
