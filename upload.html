<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Wall</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="upload-container">

    <h1 id="titolo"></h1>

    <p class="subtitle">
        CARICA LA TUA FOTO QUI<br>
        E VEDILA SUL GRANDE SCHERMO
    </p>

    <label class="upload-btn">
        SCEGLI FOTO
        <input type="file" id="files" multiple hidden>
    </label>

    <br><br>

    <button onclick="up()" class="send-btn">CARICA</button>

    <img src="logo.png" class="logo">

</div>

<script type="module">

import {CLOUD_NAME,UPLOAD_PRESET} from "./config.js";
import {addFoto} from "./db.js";

let ev=new URLSearchParams(location.search).get("evento") || "default";

// TITOLI SICURI
const eventi = {
    laurea: "FESTA DI LAUREA",
    compleanno: "COMPLEANNO",
    discoteca: "SERATA LAS",
    default: "EVENTO"
};

document.getElementById("titolo").innerText =
eventi[ev] || ev.toUpperCase();

window.up=async()=>{

let files=document.getElementById("files").files;

if(files.length === 0){
alert("Seleziona almeno una foto");
return;
}

for(let f of files){

let form=new FormData();
form.append("file",f);
form.append("upload_preset",UPLOAD_PRESET);

let res=await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:form
});

let data=await res.json();

addFoto(ev,data.secure_url);

}

alert("Foto caricate 🔥");

}

</script>

</body>
</html>
