<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="upload-container">

<h1 id="titolo"></h1>

<p class="subtitle">
CARICA LA TUA FOTO<br>
VEDILA SUL MAXI SCHERMO
</p>

<input type="file" id="files" multiple accept="image/*">

<br>

<div id="counter"></div>

<br>

<div id="preview"></div>

<br>

<div id="progressBox">
<div id="progressBar"></div>
</div>

<br>

<button onclick="up()" class="send-btn">CARICA</button>

</div>

<script type="module">

import {CLOUD_NAME,UPLOAD_PRESET} from "./config.js";

let ev = new URLSearchParams(location.search).get("evento") || "evento";
document.getElementById("titolo").innerText = ev.toUpperCase();

let selectedFiles = [];

// 📸 ANTEPRIMA
document.getElementById("files").addEventListener("change", function(e){

let preview = document.getElementById("preview");
let counter = document.getElementById("counter");

preview.innerHTML = "";

selectedFiles = Array.from(e.target.files);

counter.innerText = selectedFiles.length + " foto selezionate";

selectedFiles.forEach(file => {

let reader = new FileReader();

reader.onload = function(e){

let img = document.createElement("img");
img.src = e.target.result;
img.style.width = "90px";
img.style.margin = "5px";
img.style.borderRadius = "10px";

preview.appendChild(img);

};

reader.readAsDataURL(file);

});

});

// 🚀 UPLOAD MIGLIORATO
window.up = async function(){

if(selectedFiles.length === 0){
alert("Seleziona foto");
return;
}

let bar = document.getElementById("progressBar");
let btn = document.querySelector(".send-btn");

btn.innerText = "CARICAMENTO...";
btn.disabled = true;

// reset barra
bar.style.width = "0%";
bar.style.background = "red";

let totale = selectedFiles.length;
let count = 0;

for(let f of selectedFiles){

try{

let form = new FormData();
form.append("file", f);
form.append("upload_preset", UPLOAD_PRESET);
form.append("tags", `evento_${ev},pending`);

let res = await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:form
});

let data = await res.json();

if(data.error){
console.log(data.error);
alert("Errore upload");
btn.innerText = "CARICA";
btn.disabled = false;
return;
}

// 🔥 PROGRESS
count++;

let percent = Math.round((count / totale) * 100);

// forza aggiornamento visivo (importantissimo)
await new Promise(r => setTimeout(r, 150));

bar.style.width = percent + "%";

// 🔥 COLORI DINAMICI
if(percent < 50){
bar.style.background = "red";
}
else if(percent < 90){
bar.style.background = "orange";
}
else{
bar.style.background = "lime";
}

}catch(e){
console.log(e);
alert("Errore connessione");
btn.innerText = "CARICA";
btn.disabled = false;
return;
}

}

// ✅ COMPLETATO
btn.innerText = "CARICATO ✔";

setTimeout(() => {

alert("Caricato 🔥");

// reset UI
document.getElementById("preview").innerHTML = "";
document.getElementById("files").value = "";
document.getElementById("counter").innerText = "";

bar.style.width = "0%";
bar.style.background = "magenta";

btn.innerText = "CARICA";
btn.disabled = false;

selectedFiles = [];

}, 800);

}

</script>

</body>
</html>
