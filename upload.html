<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="upload-container">

<h1 id="titolo"></h1>

<p class="subtitle">
CARICA LA TUA FOTO<br>
VEDILA SUL MAXI SCHERMO
</p>

<label class="upload-btn">
SCEGLI FOTO
<input type="file" id="files" multiple hidden>
</label>

<br><br>

<button onclick="up()" class="send-btn">CARICA</button>

</div>

<script type="module">

import {CLOUD_NAME,UPLOAD_PRESET,FOLDER} from "./config.js";

let ev = new URLSearchParams(location.search).get("evento");

document.getElementById("titolo").innerText = ev || "EVENTO";

window.up = async function(){

let files = document.getElementById("files").files;

if(files.length === 0){
alert("Seleziona foto");
return;
}

for(let f of files){

let form = new FormData();
form.append("file", f);
form.append("upload_preset", UPLOAD_PRESET);

// 🔥 upload in PENDING
form.append("folder", `${FOLDER}/${ev}/pending`);

await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:form
});

}

alert("Caricato 🔥");

}

</script>

</body>
</html>
