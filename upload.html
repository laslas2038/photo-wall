<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="upload-container">

<h1 id="titolo"></h1>

<p class="subtitle">
CARICA LA TUA FOTO<br>
VEDILA SUL MAXI SCHERMO
</p>

<!-- 🔥 INPUT FILE -->
<input type="file" id="files" multiple accept="image/*">

<br><br>

<!-- 🔥 ANTEPRIME -->
<div id="preview"></div>

<br>

<button onclick="up()" class="send-btn">CARICA</button>

</div>

<script type="module">

import {CLOUD_NAME,UPLOAD_PRESET} from "./config.js";

let ev = new URLSearchParams(location.search).get("evento") || "evento";

document.getElementById("titolo").innerText = ev.toUpperCase();

let selectedFiles = [];

// 🔥 ANTEPRIMA LIVE
document.getElementById("files").addEventListener("change", function(e){

let preview = document.getElementById("preview");
preview.innerHTML = "";

selectedFiles = Array.from(e.target.files);

selectedFiles.forEach(file => {

let reader = new FileReader();

reader.onload = function(e){

let img = document.createElement("img");
img.src = e.target.result;
img.style.width = "100px";
img.style.margin = "5px";
img.style.borderRadius = "10px";

preview.appendChild(img);

};

reader.readAsDataURL(file);

});

});

// 🔥 UPLOAD
window.up = async function(){

if(selectedFiles.length === 0){
alert("Seleziona foto");
return;
}

for(let f of selectedFiles){

let form = new FormData();
form.append("file", f);
form.append("upload_preset", UPLOAD_PRESET);
form.append("tags", `evento_${ev},pending`);

await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:form
});

}

alert("Caricato 🔥");

// 🔥 reset UI
document.getElementById("preview").innerHTML = "";
document.getElementById("files").value = "";
selectedFiles = [];

}

</script>

</body>
</html>
