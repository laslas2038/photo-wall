<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Wall</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="upload-container">

    <h1 id="titolo"></h1>

    <p class="subtitle">
        CARICA LA TUA FOTO QUI<br>
        E VEDILA SUL GRANDE SCHERMO
    </p>

    <label class="upload-btn">
        SCEGLI FOTO
        <input type="file" id="files" multiple hidden>
    </label>

    <br><br>

    <button onclick="up()" class="send-btn">CARICA</button>

</div>

<script>

let SERVER = "http://localhost:3000";

// 🔥 prendi ID evento da URL
let params = new URLSearchParams(location.search);
let folderId = params.get("evento");

// titolo (lo recuperiamo dal server)
async function loadTitle(){

if(!folderId){
document.getElementById("titolo").innerText = "EVENTO";
return;
}

let folders = await fetch(SERVER + "/folders").then(r=>r.json());

let folder = folders.find(f => f.id === folderId);

document.getElementById("titolo").innerText = folder ? folder.name : "EVENTO";

}

loadTitle();

async function up(){

let files = document.getElementById("files").files;

if(files.length === 0){
alert("Seleziona una foto");
return;
}

if(!folderId){
alert("Evento non valido");
return;
}

// 🔥 upload diretto nella cartella
for(let f of files){

let form = new FormData();
form.append("file", f);
form.append("folderId", folderId);

await fetch("http://localhost:3001 + "/upload", {
method: "POST",
body: formData
});

}

alert("Foto caricate su Drive 🔥");

}

</script>

</body>
</html>
