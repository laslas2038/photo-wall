<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="upload-container">

<h1>LAS</h1>

<p class="subtitle">
CARICA LA TUA FOTO<br>
VEDILA SUL MAXI SCHERMO
</p>

<input type="file" id="files" multiple accept="image/*">

<br>
<div id="counter"></div>
<br>

<div id="preview"></div>

<br>

<div id="progressBox">
<div id="progressBar"></div>
</div>

<br>

<button onclick="up()" class="send-btn">CARICA</button>

</div>

<script type="module">

import {CLOUD_NAME,UPLOAD_PRESET,EVENTO,firebaseConfig} from "./config.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedFiles = [];

document.getElementById("files").addEventListener("change", e => {

let preview = document.getElementById("preview");
let counter = document.getElementById("counter");

preview.innerHTML = "";

selectedFiles = Array.from(e.target.files);

counter.innerText = selectedFiles.length + " foto selezionate";

selectedFiles.forEach(file => {

let reader = new FileReader();

reader.onload = e => {

let img = document.createElement("img");
img.src = e.target.result;
img.className = "preview-img";

preview.appendChild(img);

};

reader.readAsDataURL(file);

});

});

// 🚀 UPLOAD
window.up = async function(){

if(selectedFiles.length === 0){
alert("Seleziona foto");
return;
}

let bar = document.getElementById("progressBar");
let btn = document.querySelector(".send-btn");

btn.innerText = "CARICAMENTO...";
btn.disabled = true;

let totale = selectedFiles.length;
let count = 0;

for(let f of selectedFiles){

let form = new FormData();
form.append("file", f);
form.append("upload_preset", UPLOAD_PRESET);

let res = await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:form
});

let data = await res.json();

// 🔥 salva su firebase
await addDoc(collection(db, "eventi", EVENTO, "foto"), {
url: data.secure_url,
stato: "pending",
created: Date.now()
});

// progress
count++;
bar.style.width = Math.round((count/totale)*100) + "%";

await new Promise(r => setTimeout(r,100));

}

btn.innerText = "CARICATO ✔";

setTimeout(()=> location.reload(), 800);

}

</script>

</body>
</html>
