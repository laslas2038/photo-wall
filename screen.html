<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="title" id="t"></div>

<div id="screen">
<img id="img">
</div>

<script type="module">

import {CLOUD_NAME,TIMER} from "./config.js";

let ev = new URLSearchParams(location.search).get("evento");
document.getElementById("t").innerText = ev;

let immagini = [];
let index = 0;

async function load(){

try{

let res = await fetch(
`https://res.cloudinary.com/${CLOUD_NAME}/image/list/evento_${ev}.json`
);

let data = await res.json();

// solo LIVE
immagini = data.resources
.filter(r => r.tags.includes("live"))
.map(r =>
`https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${r.public_id}.jpg`
);

}catch(e){
console.log("Errore load", e);
}

}

async function loop(){

if(immagini.length === 0){
await load();
setTimeout(loop,TIMER);
return;
}

if(index >= immagini.length) index = 0;

let url = immagini[index].replace(
"/upload/",
"/upload/c_fill,w_1920,h_1080,g_auto/"
);

document.getElementById("img").src = url;

index++;

setTimeout(loop,TIMER);

}

load();
loop();

</script>

</body>
</html>
