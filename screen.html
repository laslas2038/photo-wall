<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<img src="las-logo.png" class="logo-screen">

<div id="screen">
<img id="img">
</div>

<script type="module">

import {firebaseConfig,EVENTO,TIMER} from "./config.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let immagini = [];
let index = 0;

onSnapshot(collection(db, "eventi", EVENTO, "foto"), (snapshot) => {

immagini = [];

snapshot.forEach(d => {
let data = d.data();
if(data.stato === "live") immagini.push(data.url);
});

});

function loop(){

if(immagini.length === 0){
setTimeout(loop,2000);
return;
}

if(index >= immagini.length) index = 0;

let img = document.getElementById("img");

img.classList.add("hide");

setTimeout(()=>{

img.src = immagini[index];
img.classList.remove("hide");
img.classList.add("show");

index++;

},400);

setTimeout(loop,TIMER);

}

loop();

</script>

</body>
</html>
