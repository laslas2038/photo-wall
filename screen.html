<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">

<style>

/* 🔥 BOX LIKE */
#likeBox{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);

font-size:40px;
font-weight:bold;

color:white;

background: rgba(0,0,0,0.4);
padding:15px 30px;
border-radius:20px;

backdrop-filter: blur(10px);

box-shadow:0 0 20px rgba(255,0,150,0.5);

display:flex;
align-items:center;
gap:10px;
}

/* ❤️ cuore */
#likeBox span{
color:magenta;
font-size:45px;
}

</style>

</head>

<body>

<img src="las-logo.png" class="logo-screen">

<div id="screen">
<img id="img">
</div>

<!-- 🔥 LIKE -->
<div id="likeBox">
<span>❤️</span>
<div id="likeCount">0</div>
</div>

<script type="module">

import {firebaseConfig,EVENTO,TIMER} from "./config.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let immagini = [];
let index = 0;

// 🔥 CARICA FOTO + LIKE
onSnapshot(collection(db, "eventi", EVENTO, "foto"), (snapshot) => {

immagini = [];

snapshot.forEach(d => {
let data = d.data();

if(data.stato === "live"){
immagini.push({
url: data.url,
likes: data.likes || 0
});
}

});

});

// 🔥 LOOP
function loop(){

if(immagini.length === 0){
setTimeout(loop,2000);
return;
}

if(index >= immagini.length) index = 0;

let img = document.getElementById("img");
let likeBox = document.getElementById("likeCount");

img.classList.add("hide");

setTimeout(()=>{

img.src = immagini[index].url;

// 🔥 aggiorna like
likeBox.innerText = immagini[index].likes;

img.classList.remove("hide");
img.classList.add("show");

index++;

},400);

setTimeout(loop,TIMER);

}

loop();

</script>

</body>
</html>
