<div class="title" id="t"></div>

<div id="screen">
    <img id="img">
</div>

<script type="module">

import {getDB} from "./db.js";
import {TIMER} from "./config.js";

let ev=new URLSearchParams(location.search).get("evento");
document.getElementById("t").innerText=ev;

let index = 0;

function loop(){

let arr=(getDB()[ev]||[]).filter(f=>f.approvata);

if(arr.length == 0){
setTimeout(loop,TIMER);
return;
}

if(index >= arr.length) index = 0;

let foto = arr[index];

let fixed;

if(foto.url.includes("/upload/")){
fixed = foto.url.replace(
"/upload/",
"/upload/c_fill,w_1920,h_1080,g_auto/"
);
}else{
fixed = foto.url;
}

document.getElementById("img").src = fixed;

index++;

setTimeout(loop,TIMER);

}

loop();

</script>
