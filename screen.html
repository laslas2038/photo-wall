<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="title">LAS</div>

<div id="screen">
<img id="img">
</div>

<script type="module">

import {CLOUD_NAME,TIMER} from "./config.js";

const ev = "LAS";

let immagini = [];
let index = 0;

async function load(){

let res = await fetch(
`https://res.cloudinary.com/${CLOUD_NAME}/image/list/evento_${ev}.json`
);

let data = await res.json();

immagini = data.resources
.filter(r => r.tags.includes("live"))
.map(r =>
`https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${r.public_id}.jpg`
);

}

async function loop(){

if(immagini.length === 0){
await load();
setTimeout(loop,TIMER);
return;
}

if(index >= immagini.length) index = 0;

document.getElementById("img").src = immagini[index];

index++;

setTimeout(loop,TIMER);

}

load();
loop();

</script>

</body>
</html>
