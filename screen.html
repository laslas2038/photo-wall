<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="title" id="t"></div>

<div id="screen">
    <img id="img">
</div>

<script type="module">

import {getDB} from "./db.js";
import {TIMER} from "./config.js";

let ev=new URLSearchParams(location.search).get("evento");
document.getElementById("t").innerText=ev;

let index = 0;

function loop(){

let db = getDB();

let arr = (db.eventi[ev]?.foto || []).filter(f=>f.approvata);

if(arr.length == 0){
setTimeout(loop,TIMER);
return;
}

if(index >= arr.length) index = 0;

let foto = arr[index];

let fixed = foto.url.includes("/upload/")
? foto.url.replace("/upload/","/upload/c_fill,w_1920,h_1080,g_auto/")
: foto.url;

document.getElementById("img").src = fixed;

index++;

setTimeout(loop,TIMER);

}

loop();

</script>

</body>
</html>
