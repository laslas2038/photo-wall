<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">

<style>
#img{
transition: all 1s ease;
}
</style>

</head>

<body>

<div class="title">LAS</div>

<div id="screen">
<img id="img">
</div>

<script>

let immagini = JSON.parse(localStorage.getItem("live") || "[]");

let index = 0;

function loop(){

immagini = JSON.parse(localStorage.getItem("live") || "[]");

if(immagini.length === 0){
setTimeout(loop,2000);
return;
}

if(index >= immagini.length) index = 0;

let img = document.getElementById("img");

img.style.opacity = 0;

setTimeout(()=>{

img.src = immagini[index];
img.style.opacity = 1;

index++;

},300);

setTimeout(loop,3000);

}

loop();

</script>

</body>
</html>
