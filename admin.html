<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">

<style>
#pending img, #live img{
width:200px;
border-radius:12px;
margin:10px;
}

button{
padding:15px 25px;
font-size:18px;
margin:5px;
}

#pending div, #live div{
margin-bottom:20px;
}
</style>

</head>

<body>

<h1>ADMIN LAS</h1>

<hr>

<h2>📥 PENDING</h2>
<div id="pending"></div>

<hr>

<h2>✅ APPROVATE</h2>
<div id="live"></div>

<script>

if(sessionStorage.getItem("admin") !== "ok"){
location = "admin-login.html";
}

// 🔥 STORAGE
let pending = JSON.parse(localStorage.getItem("pending") || "[]");
let live = JSON.parse(localStorage.getItem("live") || []);

// 🔥 DEBUG AUTO CARICAMENTO
if(pending.length === 0){
alert("⚠️ Nessuna foto pending.\nApri upload e carica qualcosa");
}

// 🔥 RENDER
function render(){

let pDiv = document.getElementById("pending");
let lDiv = document.getElementById("live");

pDiv.innerHTML = "";
lDiv.innerHTML = "";

// 📥 PENDING
pending.forEach((url,i)=>{

pDiv.innerHTML += `
<div>
<img src="${url}">
<br>
<button onclick="approva(${i})">APPROVA</button>
<button onclick="eliminaPending(${i})">ELIMINA</button>
</div>
`;

});

// ✅ LIVE
live.forEach((url,i)=>{

lDiv.innerHTML += `
<div>
<img src="${url}">
<br>
<span style="color:lime">✔ APPROVATA</span>
<button onclick="eliminaLive(${i})">ELIMINA</button>
</div>
`;

});

}

// 🔥 APPROVA
function approva(i){

live.push(pending[i]);
pending.splice(i,1);

save();
render();

}

// ❌ ELIMINA
function eliminaPending(i){
pending.splice(i,1);
save();
render();
}

function eliminaLive(i){
live.splice(i,1);
save();
render();
}

// 💾 SAVE
function save(){
localStorage.setItem("pending", JSON.stringify(pending));
localStorage.setItem("live", JSON.stringify(live));
}

// 🔄 LOOP
setInterval(render,2000);

render();

</script>

</body>
</html>
