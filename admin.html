<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ADMIN</h1>

<input id="newEvento" placeholder="Nuovo evento">
<button onclick="creaEvento()">CREA EVENTO</button>

<hr>

<h2>EVENTI</h2>
<div id="listaEventi"></div>

<hr>

<h2>FOTO EVENTO</h2>
<div id="foto"></div>

<script type="module">

import {getDB,saveDB} from "./db.js";

let currentEvento = null;

function renderEventi(){

let db = getDB();
let container = document.getElementById("listaEventi");
container.innerHTML = "";

Object.keys(db.eventi).forEach(ev => {

let div = document.createElement("div");

div.innerHTML = `
<b onclick="seleziona('${ev}')" style="cursor:pointer">${db.eventi[ev].nome}</b>
<button onclick="eliminaEvento('${ev}')">ELIMINA</button>
`;

container.appendChild(div);

});

}

window.creaEvento = function(){

let nome = document.getElementById("newEvento").value.trim();

if(!nome) return;

let db = getDB();

db.eventi[nome] = {
nome: nome.toUpperCase(),
foto: []
};

saveDB(db);
renderEventi();

}

window.eliminaEvento = function(ev){

let db = getDB();

delete db.eventi[ev];

saveDB(db);

currentEvento = null;

renderEventi();
document.getElementById("foto").innerHTML = "";

}

window.seleziona = function(ev){
currentEvento = ev;
renderFoto();
}

function renderFoto(){

let db = getDB();

let container = document.getElementById("foto");
container.innerHTML = "";

if(!currentEvento || !db.eventi[currentEvento]) return;

let evento = db.eventi[currentEvento];

evento.foto.forEach((f,i)=>{

let div = document.createElement("div");

div.innerHTML = `
<img src="${f.url}" width="150">
<br>
<button onclick="approva(${i})">APPROVA</button>
<button onclick="elimina(${i})">ELIMINA</button>
<hr>
`;

container.appendChild(div);

});

}

window.approva = function(i){

let db = getDB();

db.eventi[currentEvento].foto[i].approvata = true;

saveDB(db);

renderFoto();

}

window.elimina = function(i){

let db = getDB();

db.eventi[currentEvento].foto.splice(i,1);

saveDB(db);

renderFoto();

}

renderEventi();

</script>

</body>
</html>
