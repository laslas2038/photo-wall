<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ADMIN</h1>

<input id="evento" placeholder="nome evento">
<button onclick="load()">CARICA</button>

<hr>

<div id="foto"></div>

<script type="module">

import {CLOUD_NAME,FOLDER} from "./config.js";

window.load = async function(){

let ev = document.getElementById("evento").value;

let res = await fetch(
`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${FOLDER}/${ev}/pending.json`
);

let data = await res.json();

let container = document.getElementById("foto");
container.innerHTML = "";

data.resources.forEach(r => {

let url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${r.public_id}.jpg`;

let div = document.createElement("div");

div.innerHTML = `
<img src="${url}" width="200"><br>
<a href="${url}" target="_blank">APRI</a>
<hr>
`;

container.appendChild(div);

});

}

</script>

</body>
</html>
