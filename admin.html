<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ADMIN LAS</h1>

<hr>

<h2>📥 PENDING</h2>
<div id="pending" class="grid-admin"></div>

<hr>

<h2>✅ APPROVATE</h2>
<div id="live" class="grid-admin"></div>

<script type="module">

import {firebaseConfig,EVENTO} from "./config.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

if(sessionStorage.getItem("admin") !== "ok"){
location = "admin-login.html";
}

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const pendingDiv = document.getElementById("pending");
const liveDiv = document.getElementById("live");

// 🔥 REALTIME
onSnapshot(collection(db, "eventi", EVENTO, "foto"), (snapshot) => {

pendingDiv.innerHTML = "";
liveDiv.innerHTML = "";

snapshot.forEach(d => {

let data = d.data();
let id = d.id;

let html = `
<div class="card">
<img src="${data.url}">
<br>
`;

if(data.stato === "pending"){
html += `
<button class="approve" onclick="approva('${id}')">APPROVA</button>
<button class="delete" onclick="elimina('${id}')">ELIMINA</button>
`;
pendingDiv.innerHTML += html + "</div>";
}

if(data.stato === "live"){
html += `
<span class="ok">✔ APPROVATA</span>
<br>
<button class="delete" onclick="elimina('${id}')">ELIMINA</button>
`;
liveDiv.innerHTML += html + "</div>";
}

});

});

// ✅ APPROVA
window.approva = async function(id){
await updateDoc(doc(db, "eventi", EVENTO, "foto", id), {
stato: "live"
});
}

// ❌ ELIMINA VERO
window.elimina = async function(id){

if(!confirm("Eliminare foto?")) return;

await deleteDoc(doc(db, "eventi", EVENTO, "foto", id));

}

</script>

</body>
</html>
