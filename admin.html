<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ADMIN</h1>

<input id="evento" placeholder="evento">
<button onclick="load()">CARICA</button>

<hr>

<h2>📥 PENDING</h2>
<div id="pending"></div>

<hr>

<h2>✅ LIVE</h2>
<div id="live"></div>

<script type="module">

import {CLOUD_NAME,UPLOAD_PRESET} from "./config.js";

if(sessionStorage.getItem("admin") !== "ok"){
location = "admin-login.html";
}

let nascosti = JSON.parse(localStorage.getItem("nascosti") || "[]");
let approvati = JSON.parse(localStorage.getItem("approvati") || "[]");

window.load = async function(){

let ev = document.getElementById("evento").value;

let res = await fetch(
`https://res.cloudinary.com/${CLOUD_NAME}/image/list/evento_${ev}.json`
);

let data = await res.json();

let pendingDiv = document.getElementById("pending");
let liveDiv = document.getElementById("live");

pendingDiv.innerHTML = "";
liveDiv.innerHTML = "";

data.resources.forEach(r => {

let id = r.public_id;
let url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${id}.jpg`;

// ❌ eliminati → non mostrare
if(nascosti.includes(id)) return;

// 📥 PENDING
if(r.tags.includes("pending") && !approvati.includes(id)){

let div = document.createElement("div");

div.innerHTML = `
<img src="${url}" width="150"><br>
<button onclick="approva('${url}','${ev}','${id}', this)">APPROVA</button>
<button onclick="elimina('${id}', this)">ELIMINA</button>
<hr>
`;

pendingDiv.appendChild(div);
}

// ✅ LIVE
if(r.tags.includes("live") || approvati.includes(id)){

let div = document.createElement("div");

div.innerHTML = `
<img src="${url}" width="150"><br>
<span style="color:lime">✔ APPROVATA</span>
<button onclick="elimina('${id}', this)">ELIMINA</button>
<hr>
`;

liveDiv.appendChild(div);
}

});

}

// 🔥 APPROVA
window.approva = async function(url, ev, id, btn){

btn.disabled = true;
btn.innerText = "APPROVO...";

try{

let res = await fetch(url);
let blob = await res.blob();

let form = new FormData();
form.append("file", blob);
form.append("upload_preset", UPLOAD_PRESET);
form.append("tags", `evento_${ev},live`);

await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:form
});

// salva decisione
approvati.push(id);
localStorage.setItem("approvati", JSON.stringify(approvati));

alert("APPROVATA 🔥");

}catch(e){
alert("Errore approvazione");
console.log(e);
}

load();

}

// ❌ ELIMINA (NASCONDE)
window.elimina = function(id, btn){

btn.disabled = true;

nascosti.push(id);
localStorage.setItem("nascosti", JSON.stringify(nascosti));

load();

}

// 🔄 refresh automatico ogni 3 sec
setInterval(() => {
let ev = document.getElementById("evento").value;
if(ev) load();
}, 3000);

</script>

</body>
</html>
