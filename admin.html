<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ADMIN</h1>

<input id="evento" placeholder="evento">
<button onclick="load()">CARICA</button>

<hr>

<div id="foto"></div>

<script type="module">

if(sessionStorage.getItem("admin") !== "ok"){
location = "admin-login.html";
}

import {CLOUD_NAME,UPLOAD_PRESET} from "./config.js";

window.load = async function(){

let ev = document.getElementById("evento").value;

let res = await fetch(
`https://res.cloudinary.com/${CLOUD_NAME}/image/list/evento_${ev}.json`
);

let data = await res.json();

let container = document.getElementById("foto");
container.innerHTML = "";

data.resources
.filter(r => r.tags.includes("pending"))
.forEach(r => {

let url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${r.public_id}.jpg`;

let div = document.createElement("div");

div.innerHTML = `
<img src="${url}" width="200"><br>
<button onclick="approva('${url}','${ev}')">APPROVA</button>
<hr>
`;

container.appendChild(div);

});

}

window.approva = async function(url, ev){

let res = await fetch(url);
let blob = await res.blob();

let form = new FormData();
form.append("file", blob);
form.append("upload_preset", UPLOAD_PRESET);

// 🔥 RICARICA COME LIVE
form.append("tags", `evento_${ev},live`);

await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:form
});

alert("APPROVATA 🔥");

}

</script>

</body>
</html>
