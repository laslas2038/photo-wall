<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="upload-container">

<h1>ADMIN LOGIN</h1>

<input type="email" id="email" placeholder="Email">
<br><br>

<input type="password" id="pass" placeholder="Password">
<br><br>

<button onclick="login()" class="send-btn">LOGIN</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { firebaseConfig } from "./config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){

let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

try{
await signInWithEmailAndPassword(auth, email, pass);

// salva sessione locale (per il redirect)
sessionStorage.setItem("admin","ok");

location = "admin.html";

}catch(e){
alert("Login errato");
}

}

</script>

</body>
</html>
