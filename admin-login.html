<h1>ADMIN</h1>

<input type="password" id="p">
<br><br>
<button onclick="login()">LOGIN</button>

<script type="module">
import {ADMIN_PASSWORD} from "./config.js";

window.login=()=>{
if(document.getElementById("p").value==ADMIN_PASSWORD){
sessionStorage.setItem("admin","ok");
location="admin.html";
}else alert("Password errata");
}
</script>
