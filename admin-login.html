<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="upload-container">

<h1>ADMIN LOGIN</h1>

<input type="password" id="p" placeholder="Password">
<br><br>

<button onclick="login()" class="send-btn">LOGIN</button>

<script type="module">

import {ADMIN_PASSWORD} from "./config.js";

window.login = () => {

let pass = document.getElementById("p").value;

if(pass === ADMIN_PASSWORD){

sessionStorage.setItem("admin","ok");
location = "admin.html";

}else{
alert("Password errata");
}

}

</script>

</body>
</html>
